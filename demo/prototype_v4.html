    <script>
    /**
     * StateManager - Finite State Machine with localStorage persistence
     */
    class StateManager {
        constructor() {
            this.state = this.loadFromStorage() || this.getInitialState();
            this.listeners = new Map();
            this.setupAutoSave();
        }

        getInitialState() {
            return {
                user: {
                    id: 'user_' + Date.now(),
                    name: '',
                    company: '',
                    profile: {
                        products: '',
                        advantages: [],
                        markets: '',
                        age: '',
                        revenue: '',
                        step: 0
                    }
                },
                currentFlow: 'onboarding',
                flowStep: 0,
                activeTask: null,
                messages: [],
                leads: [],
                tasks: [],
                settings: {
                    emailChannel: null,
                    siteConnection: null,
                    seoMode: null,
                    preferences: {}
                }
            };
        }

        loadFromStorage() {
            try {
                const saved = localStorage.getItem('dealclaw_state_v4');
                return saved ? JSON.parse(saved) : null;
            } catch (e) {
                console.error('Failed to load state:', e);
                return null;
            }
        }

        saveToStorage() {
            try {
                localStorage.setItem('dealclaw_state_v4', JSON.stringify(this.state));
            } catch (e) {
                console.error('Failed to save state:', e);
            }
        }

        setupAutoSave() {
            setInterval(() => this.saveToStorage(), 5000);
            window.addEventListener('beforeunload', () => this.saveToStorage());
        }

        get(path = null) {
            if (!path) return this.state;
            return path.split('.').reduce((obj, key) => obj?.[key], this.state);
        }

        set(path, value) {
            const keys = path.split('.');
            const lastKey = keys.pop();
            const target = keys.reduce((obj, key) => {
                if (!obj[key]) obj[key] = {};
                return obj[key];
            }, this.state);
            
            const oldValue = target[lastKey];
            target[lastKey] = value;
            
            this.notify(path, value, oldValue);
            return this;
        }

        subscribe(path, callback) {
            if (!this.listeners.has(path)) {
                this.listeners.set(path, new Set());
            }
            this.listeners.get(path).add(callback);
            return () => this.listeners.get(path)?.delete(callback);
        }

        notify(path, newValue, oldValue) {
            this.listeners.get(path)?.forEach(cb => cb(newValue, oldValue, path));
            
            const parts = path.split('.');
            while (parts.pop() && parts.length) {
                const parentPath = parts.join('.');
                this.listeners.get(parentPath)?.forEach(cb => cb(
                    this.get(parentPath), 
                    undefined, 
                    parentPath
                ));
            }
        }

        reset() {
            this.state = this.getInitialState();
            localStorage.removeItem('dealclaw_state_v4');
            this.notify('', this.state, null);
        }
    }

    /**
     * EventBus - Pub/Sub for decoupled component communication
     */
    class EventBus {
        constructor() {
            this.events = new Map();
        }

        on(event, callback) {
            if (!this.events.has(event)) {
                this.events.set(event, new Set());
            }
            this.events.get(event).add(callback);
            return () => this.off(event, callback);
        }

        off(event, callback) {
            this.events.get(event)?.delete(callback);
        }

        emit(event, data) {
            this.events.get(event)?.forEach(callback => {
                try {
                    callback(data);
                } catch (e) {
                    console.error(`Error in event handler for ${event}:`, e);
                }
            });
        }
    }

    /**
     * MockAPI - Simulated backend API with realistic delays
     */
    class MockAPI {
        constructor() {
            this.latency = { min: 300, max: 1200 };
            this.errorRate = 0.03;
        }

        async simulateDelay() {
            const delay = Math.random() * (this.latency.max - this.latency.min) + this.latency.min;
            await new Promise(resolve => setTimeout(resolve, delay));
        }

        shouldError() {
            return Math.random() < this.errorRate;
        }

        async analyzeIntent(text) {
            await this.simulateDelay();
            if (this.shouldError()) throw new Error('网络连接失败，请重试');
            
            const lower = text.toLowerCase();
            if (lower.includes('获客') || lower.includes('找客户') || lower.includes('批发商')) {
                return { intent: 'create_task', confidence: 0.95 };
            }
            if (lower.includes('进展') || lower.includes('进度') || lower.includes('效果')) {
                return { intent: 'check_progress', confidence: 0.92 };
            }
            if (lower.includes('线索')) return { intent: 'view_leads', confidence: 0.88 };
            if (lower.includes('seo') || lower.includes('@seo')) return { intent: 'agent_direct', agent: 'seo', confidence: 0.90 };
            if (lower.includes('邮件') || lower.includes('email') || lower.includes('@email')) {
                return { intent: 'agent_direct', agent: 'email', confidence: 0.90 };
            }
            return { intent: 'general_chat', confidence: 0.70 };
        }

        async generateCompanyProfile(data) {
            await this.simulateDelay();
            return {
                products: data.products || '户外用品',
                advantages: data.advantages?.length ? data.advantages : ['自有工厂', 'OEM定制'],
                markets: data.markets || '北美、欧洲',
                suggestions: ['建议重点关注北美批发商', '可拓展欧洲品牌商市场']
            };
        }

        async generateTargetProfile(taskData) {
            await this.simulateDelay();
            return {
                region: taskData.region || '美国',
                industry: taskData.industry || '户外用品批发',
                size: '中型（50-200人）',
                budget: taskData.budget || '100万-500万美元',
                decisionMaker: '采购经理/采购总监',
                estimatedMatches: Math.floor(Math.random() * 500) + 800
            };
        }

        async generateStrategy(targetProfile) {
            await this.simulateDelay();
            return {
                channels: [
                    {
                        agent: 'SEO',
                        strategy: '内容获客',
                        details: `核心关键词：wholesale ${targetProfile.industry} ${targetProfile.region}`,
                        frequency: '每周2篇',
                        expectedLeads: Math.floor(Math.random() * 5) + 8
                    },
                    {
                        agent: 'Email',
                        strategy: '外联获客',
                        details: `精准筛选${targetProfile.estimatedMatches}家企业`,
                        frequency: '每日30封',
                        expectedLeads: Math.floor(Math.random() * 8) + 12
                    }
                ],
                timeline: '4-6周',
                totalExpected: '20-30条线索',
                estimatedCost: '¥85-110/条'
            };
        }

        async getLeads() {
            await this.simulateDelay();
            return [
                { id: 1, name: 'Sarah Lee', company: 'OutdoorGear Inc', role: '采购总监', location: '美国 · 加州', score: 94, time: '2分钟前', source: 'LinkedIn互动', message: 'Great product! Can you send me a quote for 500 units?', status: 'new' },
                { id: 2, name: 'Mike Johnson', company: 'Camping World', role: '采购经理', location: '美国 · 德州', score: 87, time: '15分钟前', source: '邮件回复', message: 'Interested in your tent catalog, please send more info', status: 'new' },
                { id: 3, name: 'Emma Wilson', company: 'Adventure Co', role: '创始人', location: '加拿大 · 温哥华', score: 82, time: '1小时前', source: 'SEO转化', message: 'Looking for wholesale partner for outdoor gear', status: 'contacted' }
            ];
        }

        async getTaskProgress(taskId) {
            await this.simulateDelay();
            return {
                status: 'running',
                progress: 42,
                agents: [
                    { name: 'SEO Agent', status: 'running', progress: 65, leads: 3 },
                    { name: 'Email Agent', status: 'running', progress: 38, leads: 5 }
                ],
                stats: { emailsSent: 156, emailsDelivered: 152, openRate: 28.3, replyRate: 4.2 }
            };
        }

        async generateReply(leadId, context) {
            await this.simulateDelay();
            return {
                subject: 'Re: Quote Request - Wholesale Tents',
                body: `Hi ${context.name},\n\nThank you for your interest in our products! I'd be happy to provide a quote for 500 units.\n\nBased on your requirements:\n• Unit price: $XX FOB Shanghai\n• Production time: 25 days\n• MOQ: 500 units\n• Sample available\n\nWould you like to schedule a call to discuss further?\n\nBest regards,\n[Your Name]`,
                confidence: 0.92
            };
        }
    }

    // Initialize global instances
    const stateManager = new StateManager();
    const eventBus = new EventBus();
    const mockAPI = new MockAPI();
    </script>

    <script>
    /**
     * ChatRenderer - Renders messages, cards, and interactive elements
     */
    class ChatRenderer {
        constructor(containerId) {
            this.container = document.getElementById(containerId);
        }

        renderMessage({ type, content, card = null, actions = [] }, append = true) {
            const isAgent = type === 'agent';
            const messageHTML = `
                <div class="message-bubble flex gap-4 ${isAgent ? '' : 'flex-row-reverse'} mb-6">
                    <div class="w-10 h-10 rounded-full flex-shrink-0 ${isAgent ? 'agent-avatar' : 'user-avatar'} flex items-center justify-center">
                        <i data-lucide="${isAgent ? 'bot' : 'user'}" class="w-5 h-5 text-white"></i>
                    </div>
                    <div class="max-w-[70%]">
                        <div class="${isAgent ? 'bg-chat-bg border border-border-dark text-text-primary' : 'bg-user-msg text-text-primary'} rounded-2xl px-5 py-3 shadow-sm">
                            <div class="text-sm leading-relaxed">${content}</div>
                        </div>
                        ${actions.length ? this.renderActions(actions) : ''}
                        ${card ? this.renderCard(card) : ''}
                    </div>
                </div>
            `;
            
            if (append) {
                this.container.insertAdjacentHTML('beforeend', messageHTML);
                this.scrollToBottom();
            } else {
                this.container.insertAdjacentHTML('afterbegin', messageHTML);
            }
            
            lucide.createIcons();
            return this;
        }

        renderActions(actions) {
            return `
                <div class="flex flex-wrap gap-2 mt-3">
                    ${actions.map(action => `
                        <button onclick="window.handleAction('${action.value}')" 
                            class="px-4 py-2 bg-chat-bg border border-border-dark rounded-xl text-sm text-text-primary hover:border-primary hover:text-primary transition-all card-hover">
                            ${action.label}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        renderCard(card) {
            const renderers = {
                'company-profile': (data) => this.renderCompanyProfileCard(data),
                'target-profile': (data) => this.renderTargetProfileCard(data),
                'strategy': (data) => this.renderStrategyCard(data),
                'lead': (data) => this.renderLeadCard(data),

                'seo-article': (data) => this.renderSEOArticleCard(data),
                'email-preview': (data) => this.renderEmailPreviewCard(data)

            const renderer = renderers[card.type];
            return renderer ? renderer(card.data) : '';
        }

    <script>
    /**
     * OnboardingFlow - Complete user onboarding (MA-001~MA-001f)
     */
    class OnboardingFlow {
        constructor(stateManager, chatRenderer, panelManager) {
            this.state = stateManager;
            this.chat = chatRenderer;
            this.panel = panelManager;
            
            eventBus.on('action', (e) => this.handleAction(e.value));
            eventBus.on('user-message', (e) => this.handleUserMessage(e.text));
            eventBus.on('open-profile-editor', () => this.openProfileEditor());
            eventBus.on('profile-updated', () => this.onProfileUpdated());
        }

        async start() {
            this.chat.clear();
            this.panel.switch('welcome');
            
            await this.delay(300);
            this.chat.renderMessage({
                type: 'agent',
                content: `你好！我是您的<span class="font-semibold text-primary">数字员工团队主管</span>。<br><br>我将为您协调<span class="font-medium">SEO、邮件</span>等专业Agent，帮您获取海外客户。<br><br>首先让我了解您的企业，这样我才能更精准地为您服务。`,
                actions: [
                    { label: '📝 对话回答', value: 'onboarding-chat' },
                    { label: '📎 上传资料', value: 'onboarding-upload' },
                    { label: '🔄 两者结合', value: 'onboarding-both' }
                ]
            });
        }

        async handleUserMessage(text) {
            const step = this.state.get('user.profile.step');
            
            if (step === 1) {
                this.state.set('user.profile.products', text);
                this.state.set('user.profile.step', 2);
                
                this.chat.showTyping();
                await this.delay(800);
                this.chat.hideTyping();
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: `<strong>Q2/5:</strong> 您的产品核心优势是什么？`,
                    actions: [
                        { label: '自有工厂/OEM', value: 'adv-oem' },
                        { label: '价格优势', value: 'adv-price' },
                        { label: '质量认证', value: 'adv-cert' },
                        { label: '设计研发', value: 'adv-design' }
                    ]
                });
            }
            else if (step === 2 && !text.startsWith('adv-') && !text.startsWith('没有了') && !text.startsWith('继续')) {
                const current = this.state.get('user.profile.advantages') || [];
                current.push(text);
                this.state.set('user.profile.advantages', current);
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: `已记录：${text}<br><br>还有其他优势吗？`,
                    actions: [
                        { label: '没有了，继续', value: 'adv-done' },
                        { label: '继续添加', value: 'adv-more' }
                    ]
                });
            }
            else if (step === 3) {
                this.state.set('user.profile.markets', text);
                this.state.set('user.profile.step', 4);
                
                this.chat.showTyping();
                await this.delay(800);
                this.chat.hideTyping();
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: `<strong>Q4/5:</strong> 您的公司成立多久了？`,
                    actions: [
                        { label: '1-3年', value: 'age-1-3' },
                        { label: '3-5年', value: 'age-3-5' },
                        { label: '5-10年', value: 'age-5-10' },
                        { label: '10年以上', value: 'age-10+' }
                    ]
                });
            }
            else if (step === 4) {
                this.state.set('user.profile.age', text);
                this.state.set('user.profile.step', 5);
                
                this.chat.showTyping();
                await this.delay(800);
                this.chat.hideTyping();
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: `<strong>Q5/5:</strong> 您的年出口额大概是？`,
                    actions: [
                        { label: '< 100万美元', value: 'revenue-s' },
                        { label: '100-500万美元', value: 'revenue-m' },
                        { label: '500-1000万美元', value: 'revenue-l' },
                        { label: '> 1000万美元', value: 'revenue-xl' }
                    ]
                });
            }
            else if (step === 5) {
                this.state.set('user.profile.revenue', text);
                await this.generateProfile();
            }
        }

        async handleAction(value) {
            const step = this.state.get('user.profile.step');
            
            if (value.startsWith('onboarding-')) {
                const method = value.replace('onboarding-', '');
                this.state.set('onboarding.method', method);
                this.state.set('user.profile.step', 1);
                
                this.chat.showTyping();
                await this.delay(600);
                this.chat.hideTyping();
                
                if (method === 'upload') {
                    this.chat.renderMessage({
                        type: 'agent',
                        content: '📎 请上传您的企业资料（公司介绍、产品目录等）<br><br>支持格式：PDF、Word、PPT',
                        actions: [{ label: '模拟上传完成', value: 'upload-complete' }]
                    });
                } else {
                    this.chat.renderMessage({
                        type: 'agent',
                        content: '好的！让我们通过几个问题来了解您的企业：',
                        actions: []
                    });
                    await this.delay(400);
                    this.chat.renderMessage({
                        type: 'agent',
                        content: `<strong>Q1/5:</strong> 您的主营产品是什么？<br><span class="text-text-secondary">例如：户外用品、电子产品、服装配饰...</span>`
                    });
                }
            }
            else if (value === 'upload-complete') {
                this.state.set('user.profile.products', '户外用品（示例）');
                this.state.set('user.profile.advantages', ['自有工厂', 'OEM定制']);
                this.state.set('user.profile.markets', '北美、欧洲');
                await this.generateProfile();
            }
            else if (value.startsWith('adv-')) {
                const current = this.state.get('user.profile.advantages') || [];
                
                if (value === 'adv-done') {
                    this.state.set('user.profile.step', 3);
                    this.chat.renderMessage({
                        type: 'agent',
                        content: `<strong>Q3/5:</strong> 您的主要出口市场是哪些？<br><span class="text-text-secondary">例如：北美、欧洲、东南亚...</span>`
                    });
                }
                else if (value === 'adv-more') {
                    this.chat.renderMessage({ type: 'agent', content: '请输入其他优势：' });
                }
                else {
                    const advMap = {
                        'adv-oem': '自有工厂/OEM',
                        'adv-price': '价格优势',
                        'adv-cert': '质量认证',
                        'adv-design': '设计研发'
                    };
                    current.push(advMap[value]);
                    this.state.set('user.profile.advantages', current);
                    
                    this.chat.renderMessage({
                        type: 'agent',
                        content: `已选择：${current.join('、')}<br><br>还有其他优势吗？`,
                        actions: [
                            { label: '没有了，继续', value: 'adv-done' },
                            { label: '继续添加', value: 'adv-more' }
                        ]
                    });
                }
            }
            else if (value.startsWith('age-') || value.startsWith('revenue-')) {
                if (value.startsWith('age-')) {
                    const ageMap = { 'age-1-3': '1-3年', 'age-3-5': '3-5年', 'age-5-10': '5-10年', 'age-10+': '10年以上' };
                    this.state.set('user.profile.age', ageMap[value]);
                    this.state.set('user.profile.step', 5);
                    
                    this.chat.showTyping();
                    await this.delay(600);
                    this.chat.hideTyping();
                    
                    this.chat.renderMessage({
                        type: 'agent',
                        content: `<strong>Q5/5:</strong> 您的年出口额大概是？`,
                        actions: [
                            { label: '< 100万美元', value: 'revenue-s' },
                            { label: '100-500万美元', value: 'revenue-m' },
                            { label: '500-1000万美元', value: 'revenue-l' },
                            { label: '> 1000万美元', value: 'revenue-xl' }
                        ]
                    });
                } else {

    /**
     * TaskFlow - Task creation and management (MA-002~MA-009)
     */
    class TaskFlow {
        constructor(stateManager, chatRenderer, panelManager) {
            this.state = stateManager;
            this.chat = chatRenderer;
            this.panel = panelManager;
            
            eventBus.on('action', (e) => this.handleAction(e.value));
            eventBus.on('user-message', (e) => this.handleUserMessage(e.text));
            eventBus.on('onboarding-complete', () => this.showWelcomeAfterOnboarding());
        }

        async showWelcomeAfterOnboarding() {
            await this.delay(600);
            this.chat.renderMessage({
                type: 'agent',
                content: '现在您可以随时告诉我您的获客目标，我来为您协调数字员工团队执行。<br><br>例如："帮我找美国户外用品批发商"'
            });
            this.panel.switch('welcome');
        }

        async handleUserMessage(text) {
            const flow = this.state.get('currentFlow');
            const lower = text.toLowerCase();
            
            if (lower.includes('获客') || lower.includes('找客户') || lower.includes('批发商')) {
                await this.startTaskCreation(text);
            }
            else if (lower.includes('进展') || lower.includes('进度') || lower.includes('效果')) {
                await this.showProgress();
            }
            else if (lower.includes('线索')) {
                await this.showLeads();
            }
            else if (lower.includes('dashboard') || lower.includes('数据') || lower.includes('效果')) {
                await this.showDashboard();
            }
        }

        async startTaskCreation(text) {
            if (this.state.get('activeTask')) {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '您已有一个进行中的任务。要创建新任务吗？',
                    actions: [
                        { label: '创建新任务', value: 'new-task-confirm' },
                        { label: '查看当前任务', value: 'view-current-task' }
                    ]
                });
                return;
            }

            // Extract info from user input
            const region = text.includes('美国') ? '美国' : text.includes('欧洲') ? '欧洲' : '美国';
            const industry = text.includes('户外') ? '户外用品' : text.includes('电子') ? '电子产品' : '户外用品';
            
            this.state.set('taskCreation', { region, industry, step: 1 });
            
            this.chat.renderMessage({
                type: 'agent',
                content: `收到！我来为您创建获客任务。<br><br>基于您的企业档案（${this.state.get('user.profile.products') || '户外用品'}出口商）：
• 目标地区：<span class="font-medium">${region}</span>
• 行业：<span class="font-medium">${industry}</span>
• 客户类型：<span class="font-medium">批发商</span><br><br>让我确认几个细节：`,
                actions: []
            });
            
            await this.delay(500);
            
            this.chat.renderMessage({
                type: 'agent',
                content: `<strong>Q1:</strong> 目标客户年采购额大概？`,
                actions: [
                    { label: '<50万美元', value: 'task-budget-s' },
                    { label: '50-200万', value: 'task-budget-m' },
                    { label: '200-500万', value: 'task-budget-l' },
                    { label: '>500万', value: 'task-budget-xl' }
                ]
            });
        }

        async handleAction(value) {
            if (value.startsWith('task-budget-')) {
                const budgetMap = {
                    'task-budget-s': '<50万美元',
                    'task-budget-m': '50-200万美元',
                    'task-budget-l': '200-500万美元',
                    'task-budget-xl': '>500万美元'
                };
                
                const taskData = this.state.get('taskCreation') || {};
                taskData.budget = budgetMap[value];
                this.state.set('taskCreation', taskData);
                
                this.chat.showTyping();
                await this.delay(800);
                this.chat.hideTyping();
                
                try {
                    const targetProfile = await mockAPI.generateTargetProfile(taskData);
                    this.state.set('targetProfile', targetProfile);
                    
                    this.chat.renderMessage({
                        type: 'agent',
                        content: '根据您的需求，我生成了目标客户画像：',
                        card: { type: 'target-profile', data: targetProfile }
                    });
                } catch (e) {
                    this.chat.renderMessage({
                        type: 'agent',
                        content: '生成画像时出现错误，请重试。',
                        actions: [{ label: '重试', value: 'retry-target-profile' }]
                    });
                }
            }
            else if (value === 'confirm-target' || value === 'retry-target-profile') {
                await this.generateStrategy();
            }
            else if (value === 'execute-strategy') {
                await this.executeTask();
            }
            else if (value === 'adjust-strategy') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '调整策略功能开发中...',
                    actions: [{ label: '返回', value: 'confirm-target' }]
                });
            }
            else if (value === 'view-current-task') {
                await this.showProgress();
            }
            else if (value === 'new-task-confirm') {
                this.state.set('activeTask', null);
                this.chat.renderMessage({
                    type: 'agent',
                    content: '好的，请告诉我新任务的获客目标：'
                });
            }
            else if (value === 'back-to-leads') {
                const leads = await mockAPI.getLeads();
                this.panel.switch('leads', { leads });
            }
            else if (value.startsWith('view-lead-')) {
                const leadId = parseInt(value.split('-')[2]);
                const leads = await mockAPI.getLeads();
                const lead = leads.find(l => l.id === leadId);
                if (lead) {
                    this.panel.switch('lead-detail', lead);
                }
            }
            else if (value.startsWith('generate-reply-')) {
                const leadId = parseInt(value.split('-')[2]);
                await this.generateReply(leadId);
            }
            else if (value.startsWith('assign-lead-')) {
                const leadId = parseInt(value.split('-')[2]);
                this.chat.renderMessage({
                    type: 'agent',
                    content: `线索 #${leadId} 已分配给销售团队。`,
                    actions: []
                });
            }
            else if (value === 'show-dashboard') {
                await this.showDashboard();
            }
        }

        async generateStrategy() {
            this.chat.showTyping();
            
            try {
                const targetProfile = this.state.get('targetProfile');
                const strategy = await mockAPI.generateStrategy(targetProfile);
                
                this.chat.hideTyping();
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: '正在协调数字员工团队制定获客方案...',
                    actions: []
                });
                
                await this.delay(800);
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: '已为您制定多渠道获客方案：',
                    card: { type: 'strategy', data: strategy }
                });
                
                this.state.set('strategy', strategy);
                
            } catch (e) {
                this.chat.hideTyping();
                this.chat.renderMessage({
                    type: 'agent',
                    content: '生成方案时出现错误，请重试。',
                    actions: [{ label: '重试', value: 'confirm-target' }]
                });
            }
        }

        async executeTask() {
            const strategy = this.state.get('strategy');
            
            this.state.set('activeTask', {
                id: 'task_' + Date.now(),
                status: 'running',
                startTime: Date.now(),
                strategy: strategy
            });
            
            this.state.set('currentFlow', 'task-running');
            
            this.chat.renderMessage({
                type: 'agent',
                content: `✅ <strong>获客任务已启动！</strong><br><br>
📋 任务名称：美国户外用品批发商获客<br>
📅 执行周期：${new Date().toLocaleDateString()} 至 ${new Date(Date.now() + 30*24*60*60*1000).toLocaleDateString()}<br><br>
🤖 数字员工团队工作状态：<br>
├─ 🔍 SEO Agent：正在生成首篇SEO文章...<br>
├─ ✉️ Email Agent：正在筛选目标客户...<br>
└─ 📊 线索中心：等待线索录入...<br><br>
💡 我会实时监控各Agent工作状态，有新线索立即推送给您。<br>
📢 每日18:00发送获客简报。`,
                actions: []
            });
            
            this.panel.switch('task-running', { progress: 42, leads: 3 });
            
            // Simulate lead arrival after 5 seconds
            setTimeout(async () => {
                const leads = await mockAPI.getLeads();
                const lead = leads[0];
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: '🔔 <strong>新线索提醒！</strong><br><br>高意向客户来访：',
                    card: { type: 'lead', data: lead }
                });
                
                this.panel.switch('leads', { leads: leads.slice(0, 3) });
            }, 5000);
        }

        async showProgress() {
            const task = this.state.get('activeTask');
            if (!task) {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '您当前没有正在执行的获客任务。',
                    actions: [{ label: '创建任务', value: 'create-new-task' }]
                });
                return;
            }
            
            this.chat.showTyping();
            
            try {
                const progress = await mockAPI.getTaskProgress(task.id);
                this.chat.hideTyping();
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: `📊 <strong>获客任务实时进展</strong><br><br>各Agent工作状态：

🔍 <strong>SEO Agent</strong>
├─ 状态：🟢 正在生成文章...
├─ 今日发布：1篇
└─ 累计发布：12篇

✉️ <strong>Email Agent</strong>
├─ 状态：🟢 正在发送邮件...
├─ 今日发送：${progress.stats.emailsSent - 128}封
├─ 已发送：${progress.stats.emailsSent}/${progress.stats.emailsSent + 200}封
└─ 回复率：${progress.stats.replyRate}%（高于行业平均3倍）`
                });
                
                this.panel.switch('task-running', progress);
                
            } catch (e) {
                this.chat.hideTyping();
                this.chat.renderMessage({
                    type: 'agent',
                    content: '获取进度时出现错误，请稍后重试。'
                });
            }
        }

        async showLeads() {
            this.chat.showTyping();
            
            try {
                const leads = await mockAPI.getLeads();
                this.chat.hideTyping();
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: `📋 <strong>线索收件箱</strong><br><br>您有 ${leads.length} 条线索：`
                });
                
                leads.forEach(lead => {
                    this.chat.renderMessage({
                        type: 'agent',
                        card: { type: 'lead', data: lead }
                    });
                });
                
                this.panel.switch('leads', { leads });
                
            } catch (e) {
                this.chat.hideTyping();
                this.chat.renderMessage({
                    type: 'agent',
                    content: '获取线索时出现错误，请稍后重试。'
                });
            }
        }

        async showDashboard() {
            this.chat.renderMessage({
                type: 'agent',
                content: '📊 <strong>本周获客数据报告</strong><br>统计周期：本周',
                card: {
                    type: 'dashboard',
                    data: {
                        metrics: [
                            { label: '总线索数', value: '23', trend: 15 },
                            { label: '高意向', value: '8', trend: 33 },
                            { label: '转化率', value: '12.5%', trend: 2.1 }
                        ],
                        channels: [
                            { name: 'SEO', leads: 8, percent: 35, color: 'bg-blue-500' },
                            { name: '邮件', leads: 10, percent: 43, color: 'bg-purple-500' },
                            { name: '社媒', leads: 5, percent: 22, color: 'bg-orange-500' }
                        ]
                    }
                }
            });
        }

        async generateReply(leadId) {
            this.chat.showTyping();
            
            try {
                const leads = await mockAPI.getLeads();
                const lead = leads.find(l => l.id === leadId);
                
                const reply = await mockAPI.generateReply(leadId, lead);
                
                this.chat.hideTyping();
                
                this.chat.renderMessage({
                    type: 'agent',
                    content: `✍️ <strong>AI回复建议</strong>（置信度 ${Math.round(reply.confidence * 100)}%）`,
                    card: {
                        type: 'email-preview',
                        data: {
                            recipient: lead.name,
                            subject: reply.subject,
                            body: reply.body
                        }
                    }
                });
                
            } catch (e) {
                this.chat.hideTyping();
                this.chat.renderMessage({
                    type: 'agent',
                    content: '生成回复时出现错误，请重试。'
                });
            }
        }

        delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    }

    <script>
    /**
     * SEOFlow - SEO configuration and management (SEO-001~SEO-010)
     */
    class SEOFlow {
        constructor(stateManager, chatRenderer, panelManager) {
            this.state = stateManager;
            this.chat = chatRenderer;
            this.panel = panelManager;
            
            eventBus.on('action', (e) => this.handleAction(e.value));
        }

        async handleAction(value) {
            if (value === 'open-seo-config') {
                await this.showSEOConfig();
            }
            else if (value.startsWith('select-seo-')) {
                const mode = value.replace('select-seo-', '');
                await this.selectSEOMode(mode);
            }
            else if (value === 'confirm-seo-mode') {
                await this.confirmSEOMode();
            }
            else if (value === 'generate-seo-content') {
                await this.generateSEOContent();
            }
            else if (value === 'edit-article') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '文章编辑器正在打开...',
                    actions: []
                });
            }
            else if (value === 'preview-article') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '文章预览功能开发中...'
                });
            }
            else if (value === 'publish-article') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '✅ 文章已发布！SEO Agent会持续优化文章排名。'
                });
            }
        }

        async showSEOConfig() {
            this.state.set('currentFlow', 'seo-config');
            
            this.chat.renderMessage({
                type: 'agent',
                content: '🔍 <strong>SEO Agent 配置</strong><br><br>请选择您的SEO获客模式：'
            });
            
            this.panel.switch('seo-config');
        }

        async selectSEOMode(mode) {
            const modeMap = {
                'mode-self': { name: '自引流模式', icon: '🏢', desc: '已有独立站' },
                'mode-ai': { name: 'AI建站模式', icon: '🚀', desc: '全新获客站点' },
                'mode-platform': { name: '平台引流', icon: '🏪', desc: 'B2B平台布局' }
            };
            
            const selected = modeMap[mode];
            this.state.set('settings.seoMode', mode);
            
            this.chat.renderMessage({
                type: 'agent',
                content: `已选择：<strong>${selected.icon} ${selected.name}</strong><br>${selected.desc}`
            });
            
            if (mode === 'mode-self') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '📋 <strong>自引流模式配置</strong><br><br>请提供您的网站信息：',
                    actions: [
                        { label: '🔗 提交网站', value: 'submit-site' },
                        { label: '📄 上传资料', value: 'upload-site-info' }
                    ]
                });
            }
            else if (mode === 'mode-ai') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '🚀 <strong>AI建站模式</strong><br><br>SEO Agent将为您创建专业的获客网站。',
                    actions: [
                        { label: '✨ 生成获客网站', value: 'generate-site' },
                        { label: '🔧 自定义域名', value: 'custom-domain' }
                    ]
                });
            }
            else if (mode === 'mode-platform') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '🏪 <strong>平台引流模式</strong><br><br>支持LinkedIn、Instagram、Facebook等平台内容分发。',
                    actions: [
                        { label: '🔗 授权LinkedIn', value: 'auth-linkedin' },
                        { label: '📸 授权Instagram', value: 'auth-instagram' },
                        { label: '👥 授权Facebook', value: 'auth-facebook' }
                    ]
                });
            }
        }

        async confirmSEOMode() {
            this.chat.renderMessage({
                type: 'agent',
                content: '✅ SEO配置已保存！SEO Agent已就位，将开始执行内容获客计划。'
            });
            this.state.set('currentFlow', 'dashboard');
        }

        async generateSEOContent() {
            this.chat.showTyping();
            await this.delay(1500);
            this.chat.hideTyping();
            
            const products = this.state.get('user.profile.products') || '户外用品';
            
            this.chat.renderMessage({
                type: 'agent',
                content: '📝 <strong>SEO文章已生成</strong><br><br>基于您的产品（' + products + '）生成了首篇SEO文章：',
                card: {
                    type: 'seo-article',
                    data: {
                        title: `Top 10 ${products} Wholesale Suppliers in USA`,
                        keywords: [`${products} wholesale`, 'US suppliers', 'B2B sourcing'],
                        preview: 'In this comprehensive guide, we explore the top wholesale suppliers for outdoor gear in the United States. From premium quality tents to durable hiking equipment, these suppliers offer...'
                    }
                }
            });
        }

        delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    }

    /**
     * EmailFlow - Email channel configuration (EM-011)
     */
    class EmailFlow {
        constructor(stateManager, chatRenderer, panelManager) {
            this.state = stateManager;
            this.chat = chatRenderer;
            this.panel = panelManager;
            
            eventBus.on('action', (e) => this.handleAction(e.value));
        }

        async handleAction(value) {
            if (value === 'config-email') {
                await this.showEmailConfig();
            }
            else if (value.startsWith('select-email-')) {
                const channel = value.replace('select-email-', '');
                await this.selectEmailChannel(channel);
            }
        }

        async showEmailConfig() {
            this.panel.switch('email-config');
            
            this.chat.renderMessage({
                type: 'agent',
                content: '📧 <strong>邮件渠道配置</strong><br><br>请选择邮件发送渠道：'
            });
        }

        async selectEmailChannel(channel) {
            const channelMap = {
                'own': { name: '自有邮箱', icon: '📧' },
                'platform': { name: '平台代发', icon: '⚡' },
                'service': { name: '专业服务商', icon: '🔧' }
            };
            
            const selected = channelMap[channel];
            this.state.set('settings.emailChannel', channel);
            
            this.chat.renderMessage({
                type: 'agent',
                content: `已选择：<strong>${selected.icon} ${selected.name}</strong>`
            });
            
            if (channel === 'own') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '请输入您的邮箱账号进行授权：',
                    actions: [
                        { label: '✅ Gmail授权', value: 'auth-gmail' },
                        { label: '✅ Outlook授权', value: 'auth-outlook' },
                        { label: '🔧 其他邮箱', value: 'auth-other' }
                    ]
                });
            }
            else if (channel === 'platform') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '✅ 平台代发已启用！每日限额300封，当日累计。',
                    actions: [{ label: '确认配置', value: 'confirm-email-config' }]
                });
            }
            else if (channel === 'service') {
                this.chat.renderMessage({
                    type: 'agent',
                    content: '专业服务商推荐：<br>• SendGrid - $15/月<br>• Amazon SES - $0.10/1000封<br>• Mailgun - $35/月',
                    actions: [
                        { label: 'SendGrid', value: 'service-sendgrid' },
                        { label: 'Amazon SES', value: 'service-ses' },
                        { label: 'Mailgun', value: 'service-mailgun' }
                    ]
                });
            }
        }
    }

    /**
     * SettingsFlow - Settings and preferences (MA-014~MA-015)
     */
    class SettingsFlow {
        constructor(stateManager, chatRenderer, panelManager) {
            this.state = stateManager;
            this.chat = chatRenderer;
            this.panel = panelManager;
            
            eventBus.on('action', (e) => this.handleAction(e.value));
        }

        async handleAction(value) {
            if (value === 'open-settings') {
                this.panel.switch('settings');
            }
            else if (value === 'config-email') {
                eventBus.emit('action', { value: 'config-email' });
            }
            else if (value === 'config-site') {
                eventBus.emit('action', { value: 'open-seo-config' });
            }
        }
    }
    </script>

    <!-- ============================================ -->
    <!-- UI INITIALIZATION -->
    <!-- ============================================ -->
    <script>
    /**
     * UIInitializer - Sets up the complete UI
     */
    class UIInitializer {
        constructor() {
            this.sidebar = document.getElementById('sidebar');
            this.chatArea = document.getElementById('chat-area');
            this.rightPanel = document.getElementById('right-panel');
        }

        init() {
            this.renderSidebar();
            this.renderChatArea();
            this.renderRightPanel();
            lucide.createIcons();
        }

        renderSidebar() {
            this.sidebar.innerHTML = `
                <div class="p-4 border-b border-border-dark">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
                            <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                        </div>
                        <span class="font-bold text-text-primary">DealClaw</span>
                    </div>
                    <p class="text-xs text-text-secondary mt-1">数字员工团队</p>
                </div>
                
                <nav class="flex-1 p-3 space-y-1 overflow-y-auto scrollbar-hide">
                    <button onclick="window.handleAction('goto-home')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-primary hover:bg-sidebar transition-colors">
                        <i data-lucide="home" class="w-4 h-4 text-text-secondary"></i>
                        首页
                    </button>
                    <button onclick="window.handleAction('goto-tasks')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-primary hover:bg-sidebar transition-colors">
                        <i data-lucide="check-square" class="w-4 h-4 text-text-secondary"></i>
                        获客任务
                    </button>
                    <button onclick="window.handleAction('goto-leads')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-primary hover:bg-sidebar transition-colors">
                        <i data-lucide="users" class="w-4 h-4 text-text-secondary"></i>
                        线索中心
                    </button>
                    <button onclick="window.handleAction('goto-seo')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-primary hover:bg-sidebar transition-colors">
                        <i data-lucide="search" class="w-4 h-4 text-text-secondary"></i>
                        SEO内容
                    </button>
                    <button onclick="window.handleAction('goto-email')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-primary hover:bg-sidebar transition-colors">
                        <i data-lucide="mail" class="w-4 h-4 text-text-secondary"></i>
                        邮件外联
                    </button>
                    <button onclick="window.handleAction('goto-analytics')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-primary hover:bg-sidebar transition-colors">
                        <i data-lucide="bar-chart-2" class="w-4 h-4 text-text-secondary"></i>
                        数据分析
                    </button>
                </nav>
                
                <div class="p-3 border-t border-border-dark">
                    <div class="bg-gradient-to-r from-primary/10 to-cta/10 rounded-lg p-3 mb-3">
                        <p class="text-xs font-medium text-text-primary mb-1">AI智能升级</p>
                        <p class="text-xs text-text-secondary mb-2">解锁更智能的获客分析</p>
                        <button class="w-full py-1.5 bg-primary text-white text-xs rounded-md hover:bg-primary/90 transition-colors">升级</button>
                    </div>
                    <button onclick="window.handleAction('open-settings')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-primary hover:bg-sidebar transition-colors">
                        <i data-lucide="settings" class="w-4 h-4 text-text-secondary"></i>
                        设置
                    </button>
                </div>
            `;
        }

        renderChatArea() {
            this.chatArea.innerHTML = `
                <div id="chat-header" class="flex items-center justify-between px-4 py-3 border-b border-border-dark bg-chat-bg">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full agent-avatar flex items-center justify-center">
                            <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                        </div>
                        <div>
                            <h2 class="font-semibold text-text-primary">Chief Agent</h2>
                            <p class="text-xs text-text-secondary flex items-center gap-1">
                                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                                在线
                            </p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="window.handleAction('refresh')" class="p-2 text-text-secondary hover:text-text-primary hover:bg-input-bg rounded-lg transition-colors">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>
                        <button onclick="window.handleAction('more-options')" class="p-2 text-text-secondary hover:text-text-primary hover:bg-input-bg rounded-lg transition-colors">
                            <i data-lucide="more-horizontal" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                
                <div id="chat-messages" class="flex-1 overflow-y-auto p-4 bg-chat-bg scrollbar-hide">
                    <!-- Messages will be rendered here -->
                </div>
                
                <div id="chat-input" class="p-4 bg-chat-bg border-t border-border-dark">
                    <div class="flex items-end gap-3">
                        <button onclick="window.handleAction('attach')" class="p-2 text-text-secondary hover:text-text-primary hover:bg-input-bg rounded-lg transition-colors flex-shrink-0">
                            <i data-lucide="paperclip" class="w-5 h-5"></i>
                        </button>
                        <div class="flex-1 relative">
                            <textarea id="message-input" 
                                class="w-full min-h-[44px] max-h-[120px] px-4 py-2.5 pr-12 bg-sidebar border border-border-dark rounded-xl text-sm resize-none focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                                placeholder="给 Chief Agent 发送消息..."
                                rows="1"
                                onkeydown="window.handleInputKeydown(event)"
                                oninput="window.autoResizeTextarea(this)"></textarea>
                            <button onclick="window.sendMessage()" class="absolute right-2 bottom-2 p-1.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" id="send-btn">
                                <i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <button onclick="window.handleAction('voice')" class="p-2 text-text-secondary hover:text-text-primary hover:bg-input-bg rounded-lg transition-colors flex-shrink-0">
                            <i data-lucide="mic" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="flex items-center justify-between mt-2">
                        <p class="text-xs text-text-secondary">按 Enter 发送，Shift + Enter 换行</p>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-text-secondary">@ 提及其他 Agent</span>
                        </div>
                    </div>
                </div>
            `;
        }

        renderRightPanel() {
            // Initial empty state - will be populated by PanelManager
            this.rightPanel.innerHTML = '';
        }
    }

    // Global UI handlers
    window.handleInputKeydown = function(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            window.sendMessage();
        }
        
        // @ trigger for agent mention
        if (event.key === '@' || (event.key === '2' && event.shiftKey)) {
            event.preventDefault();
            window.showAgentMentionPopup();
        }
    };

    window.autoResizeTextarea = function(element) {
        element.style.height = 'auto';
        element.style.height = Math.min(element.scrollHeight, 120) + 'px';
    };

    window.sendMessage = function() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (!text) return;
        
        // Render user message
        chatRenderer.renderMessage({
            type: 'user',
            content: text
        });
        
        // Clear input
        input.value = '';
        input.style.height = 'auto';
        
        // Emit user message event
        eventBus.emit('user-message', { text, timestamp: Date.now() });
    };

    window.showAgentMentionPopup = function() {
        const input = document.getElementById('message-input');
        const popupHTML = `
            <div id="agent-mention-popup" class="absolute bottom-full left-0 mb-2 bg-chat-bg border border-border-dark rounded-xl shadow-lg p-2 min-w-[200px] z-50 slide-in">
                <p class="text-xs text-text-secondary px-2 py-1">提及 Agent</p>
                <button onclick="window.insertAgentMention('@SEO Agent ')" class="w-full flex items-center gap-2 px-2 py-2 rounded-lg hover:bg-sidebar text-left text-sm">
                    <span class="w-6 h-6 rounded-full bg-blue-500 flex items-center justify-center text-xs text-white">🔍</span>
                    <span>SEO Agent</span>
                </button>
                <button onclick="window.insertAgentMention('@Email Agent ')" class="w-full flex items-center gap-2 px-2 py-2 rounded-lg hover:bg-sidebar text-left text-sm">
                    <span class="w-6 h-6 rounded-full bg-purple-500 flex items-center justify-center text-xs text-white">✉️</span>
                    <span>Email Agent</span>
                </button>
                <button onclick="window.insertAgentMention('@WhatsApp Agent ')" class="w-full flex items-center gap-2 px-2 py-2 rounded-lg hover:bg-sidebar text-left text-sm">
                    <span class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-xs text-white">💬</span>
                    <span>WhatsApp Agent</span>
                </button>
            </div>
        `;
        
        // Remove existing popup
        document.getElementById('agent-mention-popup')?.remove();
        
        // Add new popup
        input.parentElement.insertAdjacentHTML('beforeend', popupHTML);
    };

    window.insertAgentMention = function(text) {
        const input = document.getElementById('message-input');
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const currentValue = input.value;
        
        input.value = currentValue.substring(0, start) + text + currentValue.substring(end);
        input.focus();
        input.setSelectionRange(start + text.length, start + text.length);
        
        document.getElementById('agent-mention-popup')?.remove();
    };

    window.closeProfileEditor = function() {
        document.getElementById('profile-editor-modal')?.remove();
    };

    window.saveProfileChanges = function() {
        const products = document.getElementById('edit-products')?.value;
        const advantagesText = document.getElementById('edit-advantages')?.value;
        const markets = document.getElementById('edit-markets')?.value;
        
        if (products) {
            stateManager.set('user.profile.products', products);
        }
        if (advantagesText) {
            stateManager.set('user.profile.advantages', advantagesText.split('、'));
        }
        if (markets) {
            stateManager.set('user.profile.markets', markets);
        }
        
        window.closeProfileEditor();
        eventBus.emit('profile-updated');
    };

    // Close agent mention popup when clicking outside
    document.addEventListener('click', (e) => {
        const popup = document.getElementById('agent-mention-popup');
        if (popup && !popup.contains(e.target)) {
            popup.remove();
        }
    });
    </script>

    <!-- ============================================ -->
    <!-- APP INITIALIZATION -->
    <!-- ============================================ -->
    <script>
    let chatRenderer, panelManager, onboardingFlow, taskFlow, seoFlow, emailFlow, settingsFlow;

    function initApp() {
        // Initialize UI
        const ui = new UIInitializer();
        ui.init();
        
        // Initialize renderer and panel manager
        chatRenderer = new ChatRenderer('chat-messages');
        panelManager = new PanelManager('right-panel');
        
        // Initialize flows
        onboardingFlow = new OnboardingFlow(stateManager, chatRenderer, panelManager);
        taskFlow = new TaskFlow(stateManager, chatRenderer, panelManager);
        seoFlow = new SEOFlow(stateManager, chatRenderer, panelManager);
        emailFlow = new EmailFlow(stateManager, chatRenderer, panelManager);
        settingsFlow = new SettingsFlow(stateManager, chatRenderer, panelManager);
        
        // Route sidebar actions
        eventBus.on('action', (e) => {
            const value = e.value;
            if (value.startsWith('goto-')) {
                const page = value.replace('goto-', '');
                handleNavigation(page);
            }
        });
        
        // Check if onboarding is complete
        const isOnboardingComplete = stateManager.get('onboardingComplete');
        
        if (isOnboardingComplete) {
            // Show welcome message
            chatRenderer.renderMessage({
                type: 'agent',
                content: '欢迎回来！有什么可以帮您的吗？'
            });
            panelManager.switch('welcome');
        } else {
            // Start onboarding
            onboardingFlow.start();
        }
    }

    function handleNavigation(page) {
        switch(page) {
            case 'home':
                chatRenderer.renderMessage({
                    type: 'agent',
                    content: '有什么可以帮您的吗？'
                });
                panelManager.switch('welcome');
                break;
            case 'tasks':
                taskFlow.showProgress();
                break;
            case 'leads':
                taskFlow.showLeads();
                break;
            case 'seo':
                seoFlow.showSEOConfig();
                break;
            case 'email':
                emailFlow.showEmailConfig();
                break;
            case 'analytics':
                taskFlow.showDashboard();
                break;
        }
    }

    // Start app when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initApp);
    } else {
        initApp();
    }
    </script>
